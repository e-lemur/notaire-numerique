services:
  - type: web
    name: notaire-numerique-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: JWT_SECRET
        generateValue: true
      - key: VERIFY_BASE_URL
        value: https://frontend-verify-ukvrvjhh.devinapps.com/?hash={hash}
      - key: CORS_ORIGIN_REGEX
        value: (chrome-extension://.*|https?://.*)
