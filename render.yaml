services:
  # ---- Backend FastAPI (Python) ----
  - type: web
    name: notaire-numerique-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    domains:
      - api.doc-seal.com
      # Domaine historique conservé pendant la transition de marque (Trust-Seal → Doc-Seal)
      - api.trust-seal.xyz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: JWT_SECRET
        generateValue: true
      - key: VERIFY_BASE_URL
        value: https://doc-seal.com/app/?hash={hash}
      - key: CORS_ORIGIN_REGEX
        value: (chrome-extension://.*|https?://.*)
      # ---- Ancrage on-chain (Polygon Amoy testnet par défaut) ----
      # Ces variables sont laissées vides ici (sync: false) — à renseigner
      # depuis le dashboard Render avant l'activation. Tant qu'au moins une
      # des trois manque, l'app fonctionne avec la hash-chain interne uniquement.
      # Procédure complète : docs/onchain-deployment.md
      - key: WEB3_RPC_URL
        sync: false
      - key: NOTARY_CONTRACT_ADDRESS
        sync: false
      - key: WEB3_PRIVATE_KEY
        sync: false
      # URL d'explorateur pour linker la transaction depuis le QR du certificat.
      # Ex Polygon Amoy : https://amoy.polygonscan.com/tx/{tx}
      - key: ONCHAIN_EXPLORER_TX_URL
        sync: false

  # ---- Frontend statique (landing + app) ----
  - type: web
    name: trust-seal-frontend
    runtime: static
    rootDir: frontend-verify
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    domains:
      - doc-seal.com
      - www.doc-seal.com
      # Domaines historiques conservés pendant la transition de marque
      # (les utilisateurs qui visitent trust-seal.xyz sont redirigés côté client vers doc-seal.com)
      - trust-seal.xyz
      - www.trust-seal.xyz
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
