services:
  # ---- Backend FastAPI (Python) ----
  - type: web
    name: notaire-numerique-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install .
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    domains:
      - api.doc-seal.com
      # Domaine historique conservé pendant la transition de marque (Trust-Seal → Doc-Seal)
      - api.trust-seal.xyz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: JWT_SECRET
        generateValue: true
      - key: VERIFY_BASE_URL
        value: https://doc-seal.com/app/?hash={hash}
      - key: CORS_ORIGIN_REGEX
        value: (chrome-extension://.*|https?://.*)
      # Branche le backend sur la base PostgreSQL managée définie ci-dessous.
      # Sans cette variable, l'app retombe sur SQLite (filesystem éphémère
      # sur Render free) et perd les scellements à chaque redéploiement.
      - key: DATABASE_URL
        fromDatabase:
          name: doc-seal-db
          property: connectionString

  # ---- Frontend statique (landing + app) ----
  - type: web
    name: trust-seal-frontend
    runtime: static
    rootDir: frontend-verify
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    domains:
      - doc-seal.com
      - www.doc-seal.com
      # Domaines historiques conservés pendant la transition de marque
      # (les utilisateurs qui visitent trust-seal.xyz sont redirigés côté client vers doc-seal.com)
      - trust-seal.xyz
      - www.trust-seal.xyz
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

databases:
  # Base PostgreSQL managée pour la persistance des scellements et des comptes.
  # Plan free chez Render = 1 GB, expire après 90 jours puis bascule en payant
  # ($7/mois). À surveiller dans le dashboard Render avant l'échéance.
  - name: doc-seal-db
    plan: free
    databaseName: doc_seal
    user: doc_seal
